<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MostWanted KYC</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --green: #00FF66; --bg: #000; }
        body { background: var(--bg); color: var(--green); font-family: 'Courier New', monospace; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .terminal { border: 1px solid var(--green); width: 100%; max-width: 400px; padding: 20px; background: #050505; }
        #viewArea { width: 100%; height: 180px; background: #111; border: 1px solid #333; margin: 20px 0; display: flex; align-items: center; justify-content: center; position: relative; }
        video, img { max-width: 100%; max-height: 100%; }
        .btn { background: var(--green); color: #000; border: none; padding: 15px; width: 100%; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-bottom: 10px; }
        .log { font-size: 10px; color: #888; }
    </style>
</head>
<body>

<div class="terminal">
    <h2 id="title">> IDENTIFY_STAGE</h2>
    <div id="viewArea">
        <img id="previewImg" style="display:none;">
        <video id="previewVideo" style="display:none;" autoplay playsinline></video>
    </div>
    <button class="btn" id="mainBtn" onclick="processAction()">[ SCAN_DOCUMENT ]</button>
    <div class="log" id="statusLog">> STATUS: READY_TO_INIT</div>
</div>

<input type="file" id="fileInput" accept="image/*" style="display:none;">

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    let currentStage = 0; // 0: Scan, 1: Record, 2: Uploading

    function processAction() {
        if (currentStage === 0) {
            document.getElementById('fileInput').click();
        } else if (currentStage === 1) {
            startVideoRecording();
        }
    }

    // Gestionare Foto
    document.getElementById('fileInput').onchange = (e) => {
        const file = e.target.files[0];
        if (file) {
            document.getElementById('previewImg').src = URL.createObjectURL(file);
            document.getElementById('previewImg').style.display = 'block';
            document.getElementById('title').innerText = "> BIOMETRIC_STAGE";
            document.getElementById('mainBtn').innerText = "[ START_RECORDING ]";
            document.getElementById('statusLog').innerText = "> DOCUMENT_CAPTURED. PROCEEDING...";
            currentStage = 1;
        }
    };

    // Gestionare Video
    async function startVideoRecording() {
        const video = document.getElementById('previewVideo');
        video.style.display = 'block';
        document.getElementById('previewImg').style.display = 'none';
        
        try {
            const stream = await navigator.mediaDevices.getUserMedia({video: true, audio: true});
            video.srcObject = stream;
            document.getElementById('mainBtn').innerText = "[ SEND_DATA ]";
            document.getElementById('statusLog').innerText = "> RECORDING_ACTIVE. SPEAK CLEARLY.";
        } catch (err) {
            alert("Eroare cameră: " + err.message);
        }
    }
</script>
</body>
</html>
