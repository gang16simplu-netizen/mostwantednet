<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MostWanted KYC</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #000; color: #00FF66; font-family: monospace; padding: 20px; text-align: center; }
        .box { border: 1px solid #00FF66; padding: 20px; }
        #v { width: 100%; height: 200px; background: #111; margin: 10px 0; }
        button { background: #00FF66; color: #000; border: none; padding: 15px; width: 100%; font-weight: bold; cursor: pointer; }
        #prompt { font-size: 14px; margin-bottom: 10px; color: #fff; }
    </style>
</head>
<body>

<div class="box">
    <div id="prompt">PAS 1: Selectează buletinul din galerie.</div>
    <video id="v" autoplay playsinline muted></video>
    <button id="btn" onclick="next()">[ INCARCĂ BULETINUL ]</button>
</div>

<input type="file" id="f" accept="image/*" style="display:none">

<script>
    const v = document.getElementById('v');
    const btn = document.getElementById('btn');
    const prompt = document.getElementById('prompt');
    const f = document.getElementById('f');
    let stage = 0;

    async function next() {
        if (stage === 0) {
            f.click();
        } else if (stage === 1) {
            // Inițializează camera pentru pasul 2
            const stream = await navigator.mediaDevices.getUserMedia({video: true, audio: true});
            v.srcObject = stream;
            prompt.innerText = "PAS 2: Înregistrează video. Spune: \"Confirm identitatea mea, astăzi 13 Iulie 2026\".";
            btn.innerText = "[ START/STOP ÎNREGISTRARE ]";
            stage = 2;
        }
    }

    f.onchange = () => {
        prompt.innerText = "PAS 2: Acordă permisiunea camerei și microfonului.";
        btn.innerText = "[ PORNEȘTE BIOMETRIE ]";
        stage = 1;
    };
</script>

</body>
</html>
