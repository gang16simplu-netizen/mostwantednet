<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MostWanted Quantum Security</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* [DESIGN_OPTIMIZAT_PENTRU_FLUX_COMPLET] */
        :root { --terminal-green: #00FF66; --bg-pure: #000; --panel-bg: rgba(9, 9, 11, 0.95); --error-red: #FF3B30; }
        body { background: var(--bg-pure); color: var(--terminal-green); font-family: 'Courier New', monospace; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; }
        .terminal-box { width: 90%; max-width: 360px; border: 1px solid var(--terminal-green); padding: 20px; background: var(--panel-bg); }
        .viewport { width: 100%; height: 200px; background: #111; border: 1px solid #333; margin: 15px 0; display: flex; align-items: center; justify-content: center; position: relative; }
        video, img { width: 100%; height: 100%; object-fit: cover; }
        .action-btn { background: var(--terminal-green); color: #000; border: none; padding: 12px; width: 100%; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-top: 10px; }
        .btn-reset { background: transparent; border: 1px solid var(--error-red); color: var(--error-red); }
        .teleprompter { font-size: 14px; border: 1px solid var(--terminal-green); padding: 10px; text-align: center; margin-bottom: 10px; animation: blink 2s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }
    </style>
</head>
<body>

<div class="terminal-box" id="terminal">
    <div id="stepContent">
        <h2 id="stageTitle">> IDENTIFY_STAGE</h2>
        <div class="viewport" id="vp">
            <img id="idPreview" style="display:none;">
            <video id="videoPreview" style="display:none;" autoplay muted playsinline></video>
        </div>
        
        <div id="uiArea">
            <button class="action-btn" id="mainBtn" onclick="handleAction()">[ SCAN_DOCUMENT ]</button>
            <button class="action-btn btn-reset" id="resetBtn" style="display:none;" onclick="location.reload()">[ RE-SCAN_DOCUMENT ]</button>
        </div>
        <div id="log" style="font-size: 10px; margin-top: 15px;">> STATUS: READY_TO_INIT</div>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    
    let state = 0; // 0: Photo, 1: Record, 2: Upload
    let idBlob, videoBlob;
    const today = new Date().toLocaleDateString('ro-RO', { day: 'numeric', month: 'long', year: 'numeric' });

    async function handleAction() {
        if (state === 0) {
            document.getElementById('idInput').click();
        } else if (state === 1) {
            startRecording();
        }
    }

    // Input ascuns
    const idInput = document.createElement('input');
    idInput.type = 'file'; idInput.accept = 'image/*';
    idInput.onchange = (e) => {
        idBlob = e.target.files[0];
        document.getElementById('idPreview').src = URL.createObjectURL(idBlob);
        document.getElementById('idPreview').style.display = 'block';
        document.getElementById('mainBtn').innerText = "[ NEXT_STAGE ]";
        document.getElementById('mainBtn').onclick = switchToVideo;
        document.getElementById('log').innerText = "> DOC_CAPTURED_SUCCESSFULLY";
    };

    function switchToVideo() {
        state = 1;
        document.getElementById('idPreview').style.display = 'none';
        document.getElementById('videoPreview').style.display = 'block';
        document.getElementById('stageTitle').innerText = "> BIOMETRIC_CAPTURE";
        document.getElementById('mainBtn').innerText = "[ START_RECORDING ]";
        document.getElementById('mainBtn').onclick = handleAction;
        document.getElementById('resetBtn').style.display = 'block';
        
        // Adăugăm teleprompterul
        const tp = document.createElement('div');
        tp.className = 'teleprompter';
        tp.innerText = `ROSTIȚI: "Confirm identitatea mea. Data: ${today}"`;
        document.getElementById('terminal').prepend(tp);

        navigator.mediaDevices.getUserMedia({video: true, audio: true}).then(s => {
            document.getElementById('videoPreview').srcObject = s;
        });
    }

    async function startRecording() {
        // Logica de înregistrare rămâne cea de mai sus
        document.getElementById('mainBtn').innerText = "[ STOP_AND_UPLOAD ]";
        // ... (folosește logica de MediaRecorder din codul anterior aici)
        alert("Înregistrarea a început. Rostiți clar data și confirmarea.");
    }
</script>
<input type="file" id="idInput" style="display:none;">
</body>
</html>
